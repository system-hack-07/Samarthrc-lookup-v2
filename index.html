<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMARTH_HACKER // ACCESS_TERMINAL</title>
<style>
  body { font-family: monospace; background:#020505; color:#00ffcc; margin:0; padding:0; }
  #disclaimerScreen, #loginScreen, #bootScreen, #app { display: none; padding:20px; }
  #disclaimerScreen, #loginScreen, #bootScreen { height:100vh; justify-content:center; align-items:center; display:flex; flex-direction:column; }
  button { background:#00ffcc; color:#020505; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; margin-top:10px; }
  #result { white-space: pre-line; margin-top:20px; }
  #riskIndicator h4.low { color:#00ffcc; }
  #riskIndicator h4.medium { color:#ffcc00; }
  #riskIndicator h4.high { color:#ff3300; }
  #radarScan { display:none; }
</style>
</head>
<body>

<!-- DISCLAIMER SCREEN -->
<div id="disclaimerScreen">
  <p>⚠ Disclaimer: This tool is for educational purposes only.</p>
  <button id="acceptBtn">Accept</button>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <input type="password" id="passwordInput" placeholder="Enter Password">
  <button id="loginBtn">Login</button>
  <p id="loginError"></p>
</div>

<!-- BOOT SCREEN -->
<div id="bootScreen">
  <pre id="bootLog"></pre>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">
  <h2>RC Vehicle Lookup</h2>
  <input type="text" id="rcInput" placeholder="Enter RC Number">
  <button onclick="fetchRC()">Search</button>
  <div id="radarScan">🔄 Scanning...</div>
  <div id="riskIndicator"></div>
  <pre id="result"></pre>
</div>

<!-- SOUNDS -->
<audio id="disclaimerSound" src="disclaimer.mp3"></audio>
<audio id="startupSound" src="startup.mp3"></audio>
<audio id="readySound" src="ready.mp3"></audio>
<audio id="scanSound" src="scan.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
