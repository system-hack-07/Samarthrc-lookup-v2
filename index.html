<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMARTH_HACKER // ACCESS_TERMINAL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DISCLAIMER SCREEN -->
<div id="disclaimerScreen">
  <p>⚠ Disclaimer: This tool is for educational purposes only.</p>
  <button id="acceptBtn">Accept</button>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <input type="password" id="passwordInput" placeholder="Enter Password">
  <button id="loginBtn">Login</button>
  <p id="loginError"></p>
</div>

<!-- BOOT SCREEN -->
<div id="bootScreen">
  <pre id="bootLog"></pre>
</div>

<!-- MAIN APP -->
<div id="app">
  <input type="text" id="rcInput" placeholder="Enter RC Number">
  <button onclick="fetchRC()">Search</button>
  <div id="radarScan">🔄 Scanning...</div>
  <div id="riskIndicator"></div>
  <pre id="result"></pre>
</div>

<!-- SOUNDS -->
<audio id="disclaimerSound" src="disclaimer.mp3"></audio>
<audio id="startupSound" src="startup.mp3"></audio>
<audio id="readySound" src="ready.mp3"></audio>
<audio id="scanSound" src="scan.mp3"></audio>

<script src="script.js"></script>
</body>
  </html>
